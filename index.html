<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>MCQ Quiz</title>
  
  <style>
    body {
    margin: 0;
    font-family: 'Arial', sans-serif;
}

.header {
    background-color: #3498db;
    color: #fff;
    padding: 10px;
}

.navbar {
    display: flex;
    justify-content: center; /* Center the content horizontally */
    align-items: center;
    height:1px; /* Set the height of the navbar */
}

.title {
    text-align: center; /* Center the text within the title */
    font-size: 15px; /* Adjust font size as needed */
}

.quiz-container {
    max-width: 800px;
    margin: 0 auto; /* Updated margin to 0 */
    padding: 2px;
    background-color: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 8px;
}

.question-container {
    background-color: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 2px;
}

.question-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.question-number {
    font-weight: bold;
    font-size: 18px;
}

.timer {
    font-weight: bold;
    font-size: 18px;
}

.question-content {
    margin-bottom: 20px;
}

.options label {
    display: block;
    margin-bottom: 10px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.3s ease; /* Add transition for smooth color change */
}

.options input:checked + label {
    background-color: #ddd; /* Change background color when option is checked */
}

button {
    background-color: #3498db;
    color: #fff;
    padding: 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
}

.answer {
    display: none;
    margin-top: 20px;
    padding: 10px;
    background-color: #f2f2f2;
    border: 1px solid #ddd;
    border-radius: 8px;
}

.summary {
    background-color: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    display: none;
}

.summary h2 {
    color: #3498db;
}
  </style>

  </head>

            </div>
            <div class="options">

            </div>
            <div class="answer" id="answer">
                <!-- Answer will be dynamically loaded here -->
            </div>
        </div>

        <div class="navigation"><center>
            <button onclick="previousQuestion()">Previous Question</button>
            <button onclick="nextQuestion()">Next Question</button>
          </center></div>
    </div>

var correct=0;
// Set quiz title
document.querySelector('.title').innerText = jsonData.quizTitle;

// Load questions from JSON file
const quizData = jsonData.questions;
let currentQuestion = 0;
const totalQuestions = quizData.length;
let timer;

function loadQuestion() {
    const currentQuestionData = quizData[currentQuestion];
    const questionContent = document.querySelector('.question-content');
    const imageElement = document.createElement('img');
    
    document.querySelector('.question-number').innerText = `Question ${currentQuestion + 1} / ${quizData.length}`;
    document.querySelector('.timer').innerText = 'Time: 00:00'; 

    // Hide the answer div when loading a new question
    document.getElementById('answer').style.display = 'none';

    // Display image if available
    if (currentQuestionData.image) {
        imageElement.src = currentQuestionData.image;
        imageElement.alt = `Image for Question ${currentQuestion + 1}`;
        imageElement.style.height = `${currentQuestionData.imageHeight}px`; // Set height
        imageElement.style.width = `${currentQuestionData.imageWidth}px`;  // Set width
        questionContent.innerHTML = ''; // Clear existing content
        questionContent.appendChild(imageElement);
    } else {
        questionContent.innerHTML = ''; // Clear existing content
    }

    // Display other question content
    questionContent.innerHTML += `
        <p>${currentQuestionData.question}</p>
        <p>${currentQuestionData.subtitle}</p>
        <label><button onclick="if (${currentQuestionData.Answer}==document.getElementById('A')){document.getElementById('stats').innerHTML='Correct Answer';document.getElementById('stats').style.color='green'}else{document.getElementById('stats').innerHTML='Wrong Answer';document.getElementById('stats').style.color='red'}"style="margin:2px;padding:10px;border-radius:10px;background-color:#5270ff;" id="A" value="A">A</button>${currentQuestionData.A}</label><br>
        <label><button onclick="if (${currentQuestionData.Answer}==document.getElementById('B')){document.getElementById('stats').innerHTML='Correct Answer';document.getElementById('stats').style.color='green'}else{document.getElementById('stats').innerHTML='Wrong Answer';document.getElementById('stats').style.color='red'}"style="margin:2px;padding:10px;border-radius:10px;background-color:#5270ff;"  id="B" value="B" >B</button>${currentQuestionData.B}</label><br>
        <label><button onclick="if (${currentQuestionData.Answer}==document.getElementById('C')){document.getElementById('stats').innerHTML='Correct Answer';document.getElementById('stats').style.color='green'}else{document.getElementById('stats').innerHTML='Wrong Answer';document.getElementById('stats').style.color='red'}"style="margin:2px;padding:10px;border-radius:10px;background-color:#5270ff;" id="C" value="C">C</button>${currentQuestionData.C}</label><br>
        <label><button onclick="if (${currentQuestionData.Answer}==document.getElementById('D')){document.getElementById('stats').innerHTML='Correct Answer';document.getElementById('stats').style.color='green'}else{document.getElementById('stats').innerHTML='Wrong Answer';document.getElementById('stats').style.color='red'}"style="margin:2px;padding:10px;border-radius:10px;background-color:#5270ff;" id="D" value="D">D</button>${currentQuestionData.D}</label><br>
    `;

    document.querySelector('.answer').innerText= `Answer: ${currentQuestionData.reason}`;
}

function nextQuestion() {
    // Hide the answer div when moving to the next question
    document.getElementById('answer').style.display = 'none';
  document.getElementById('stats').innerHTML=" "

    currentQuestion++;
    if (currentQuestion < totalQuestions) {
        loadQuestion();
    } else {
        alert('MCQ Completed!');
        // You can redirect or perform any other action here
    }
}

function previousQuestion() {
    currentQuestion--;
    if (currentQuestion >= 0) {
        loadQuestion();
    } else {
        // Handle case when trying to go back from the first question
        alert('This is the first question');
        currentQuestion = 0;
    }
}

function showAnswer() {
    const answerDiv = document.getElementById('answer');
    answerDiv.style.display = answerDiv.style.display === 'none' ? 'block' : 'none';
}

// Call loadQuestion to initialize the first question
loadQuestion();

// You can add timer logic as per your requirement
// Example: Start a timer and update the display every second
timer = setInterval(updateTimer, 1000);
let seconds = 0;

function updateTimer() {
    seconds++;
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    document.getElementById('timer').innerText = `Time: ${formatTime(minutes)}:${formatTime(remainingSeconds)}`;
}

function formatTime(time) {
    return time < 10 ? `0${time}` : time;
}</script>
